domain: foundation-platform
features:
  - id: feature.foundation-platform.advertising
    name: '广告与推广内容'
    status: exception-pending
    evidence:
      - path: upstream/CodexPlusPlus/crates/codex-plus-core/src/ads.rs
        symbol: ads
      - path: upstream/CodexPlusPlus/apps/codex-plus-manager/src-tauri/src/commands.rs
        symbol: load_ads
    entry_points:
      - core-module:ads
      - tauri-command:load_ads
    platforms:
      windows:
        applicability: exception-pending
        semantics: '项目禁止广告、推广位和付费导流，仅保留上游证据。'
      macos:
        applicability: exception-pending
        semantics: '项目禁止广告、推广位和付费导流，仅保留上游证据。'
    decision_refs:
      - issue:26
      - rule:AGENTS-product-constraints
