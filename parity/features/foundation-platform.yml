      windows:
        applicability: supported
        semantics: '启动或重启受管 Codex 进程，明确超时、取消和进程隔离。'
      macos:
        applicability: supported
        semantics: '启动或重启受管 Codex 进程，明确超时、取消和进程隔离。'
    decision_refs:
