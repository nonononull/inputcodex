schema_version: inputcodex.behavior-contract.v1
domain: session-data
contracts:
  - id: contract.feature.session-data.local-session-management.baseline
    feature_id: feature.session-data.local-session-management
    scenario: baseline
    preconditions:
      - '上游 Release v1.2.41 证据已锁定，所需平台适配器可用。'
    inputs:
      - name: request
        data_type: local-session-management-request
        required: false
        description: '结构化请求；无参数时为空对象。'
    outputs:
      - name: result
        data_type: local-session-management-result
        description: '本地会话与项目管理的稳定结果或明确空结果。'
    side_effects:
      - database-read
      - database-write
      - filesystem-write
    persistence: '数据库写入事务化，失败回滚且不删除原始数据。'
    errors:
      - code: LOCAL_SESSION_MANAGEMENT_FAILED
        kind: feature
        semantics: '本地会话与项目管理失败时返回稳定错误分类，不伪造空成功。'
    loading:
      states: [Idle, Loading, Ready, Empty, Failed, Cancelling]
      request_identity: '每次本地会话与项目管理请求使用唯一递增标识。'
      stale_result_rule: 旧请求结果不得覆盖更新请求的状态或数据。
    timeout:
      behavior: 超时后进入 Failed，终止本次工作并保留稳定错误分类。
      evidence: 记录请求标识、耗时和错误类别，不记录凭据或私人路径。
    cancellation:
      behavior: 取消后进入 Cancelling，完成清理后回到 Idle，旧结果失效。
      evidence: 记录取消请求、清理完成和旧请求失效。
    isolation: '本地会话与项目管理单次失败不得污染其他 feature、请求或稳定状态。'
    observability:
      - request_identity
      - duration_ms
      - outcome_class
    platforms:
      shared_semantics: '扫描、删除和移动本地会话或项目数据，删除保留可恢复证据。'
      windows: 使用 Windows 平台适配器遵循共享语义；不支持时明确失败。
      macos: 使用 macOS 平台适配器遵循共享语义；不支持时明确失败。
      differences: []
    fixture_policy:
      mode: required
      reason: '使用合成 fixture 固定结构字段、边界值与引用关系。'
    fixture_refs:
      - fixture.feature.session-data.local-session-management.baseline
