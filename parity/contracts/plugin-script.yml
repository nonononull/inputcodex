schema_version: inputcodex.behavior-contract.v1
domain: plugin-script
contracts:
  - id: contract.feature.plugin-script.dream-skin-library.baseline
    feature_id: feature.plugin-script.dream-skin-library
    scenario: baseline
    preconditions:
      - '上游 Release v1.2.41 证据已锁定，所需平台适配器可用。'
    inputs:
      - name: request
        data_type: dream-skin-library-request
        required: false
        description: '结构化请求；无参数时为空对象。'
    outputs:
      - name: result
        data_type: dream-skin-library-result
        description: 'Dream Skin 本地主题库的稳定结果或明确空结果。'
    side_effects:
      - filesystem-read
      - filesystem-write
    persistence: '文件写入原子化，失败不得留下半成品或凭据日志。'
    errors:
      - code: DREAM_SKIN_LIBRARY_FAILED
        kind: feature
        semantics: 'Dream Skin 本地主题库失败时返回稳定错误分类，不伪造空成功。'
    loading:
      states: [Idle, Loading, Ready, Empty, Failed, Cancelling]
      request_identity: '每次Dream Skin 本地主题库请求使用唯一递增标识。'
      stale_result_rule: 旧请求结果不得覆盖更新请求的状态或数据。
    timeout:
      behavior: 超时后进入 Failed，终止本次工作并保留稳定错误分类。
      evidence: 记录请求标识、耗时和错误类别，不记录凭据或私人路径。
    cancellation:
      behavior: 取消后进入 Cancelling，完成清理后回到 Idle，旧结果失效。
      evidence: 记录取消请求、清理完成和旧请求失效。
    isolation: 'Dream Skin 本地主题库单次失败不得污染其他 feature、请求或稳定状态。'
    observability:
      - request_identity
      - duration_ms
      - outcome_class
    platforms:
      shared_semantics: '审计本地图片导入、主题保存与选择，不预设注入式应用。'
      windows: 使用 Windows 平台适配器遵循共享语义；不支持时明确失败。
      macos: 使用 macOS 平台适配器遵循共享语义；不支持时明确失败。
      differences: []
    fixture_policy:
      mode: required
      reason: '使用合成 fixture 固定结构字段、边界值与引用关系。'
    fixture_refs:
      - fixture.feature.plugin-script.dream-skin-library.baseline
