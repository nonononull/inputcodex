      - '上游 Release v1.2.41 证据已锁定，所需平台适配器可用。'
    inputs:
      - name: request
        data_type: aggregate-routing-request
        required: false
        description: '结构化请求；无参数时为空对象。'
    outputs:
      - name: result
        data_type: aggregate-routing-result
        description: '聚合供应商路由的稳定结果或明确空结果。'
    side_effects:
      - filesystem-read
      - filesystem-write
    persistence: '文件写入原子化，失败不得留下半成品或凭据日志。'
    errors:
      - code: AGGREGATE_ROUTING_FAILED
        kind: feature
        semantics: '聚合供应商路由失败时返回稳定错误分类，不伪造空成功。'
    loading:
      states: [Idle, Loading, Ready, Empty, Failed, Cancelling]
      request_identity: '每次聚合供应商路由请求使用唯一递增标识。'
      stale_result_rule: 旧请求结果不得覆盖更新请求的状态或数据。
    timeout:
      behavior: 超时后进入 Failed，终止本次工作并保留稳定错误分类。
      evidence: 记录请求标识、耗时和错误类别，不记录凭据或私人路径。
    cancellation:
      behavior: 取消后进入 Cancelling，完成清理后回到 Idle，旧结果失效。
      evidence: 记录取消请求、清理完成和旧请求失效。
    isolation: '聚合供应商路由单次失败不得污染其他 feature、请求或稳定状态。'
    observability:
      - request_identity
      - duration_ms
      - outcome_class
    platforms:
      shared_semantics: '支持故障转移、会话轮转、请求轮转和权重轮转并留证。'
