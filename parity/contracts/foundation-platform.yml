schema_version: inputcodex.behavior-contract.v1
domain: foundation-platform
contracts:
  - id: contract.feature.foundation-platform.advertising.baseline
    feature_id: feature.foundation-platform.advertising
    scenario: baseline
    preconditions:
      - '独立 parity-exception 尚未获得项目所有者决定。'
    inputs:
      - name: decision_ref
        data_type: decision-reference
        required: false
        description: '可选的一致性例外决定引用；缺失时保持 pending。'
    outputs:
      - name: exception_status
        data_type: parity-exception-status
        description: '只返回待决策状态，不执行上游实现。'
    side_effects:
      - none
    persistence: '只保存审计决定引用，不加载、下载或执行上游实现。'
    errors:
      - code: PARITY_EXCEPTION_PENDING
        kind: policy
        semantics: '没有 owner 决定时明确失败，禁止静默启用。'
    loading:
      states: [Idle, Loading, Ready, Empty, Failed, Cancelling]
      request_identity: '每次广告与推广内容请求使用唯一递增标识。'
      stale_result_rule: 旧请求结果不得覆盖更新请求的状态或数据。
    timeout:
      behavior: 超时后进入 Failed，终止本次工作并保留稳定错误分类。
      evidence: 记录请求标识、耗时和错误类别，不记录凭据或私人路径。
    cancellation:
      behavior: 取消后进入 Cancelling，完成清理后回到 Idle，旧结果失效。
      evidence: 记录取消请求、清理完成和旧请求失效。
    isolation: '广告与推广内容单次失败不得污染其他 feature、请求或稳定状态。'
    observability:
      - request_identity
      - duration_ms
      - outcome_class
    platforms:
      shared_semantics: '项目禁止广告、推广位和付费导流，仅保留上游证据。'
      windows: 使用 Windows 平台适配器遵循共享语义；不支持时明确失败。
      macos: 使用 macOS 平台适配器遵循共享语义；不支持时明确失败。
      differences: []
    fixture_policy:
      mode: none
      reason: '只记录待决策状态，禁止执行上游实现。'
    fixture_refs: []
