name: 缺陷报告
description: 报告可复现的 inputcodex 功能、稳定性或兼容性问题。
title: "[Bug] "
labels:
  - "type:bug"
body:
  - type: input
    id: version
    attributes:
      label: inputcodex 版本或提交
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: 平台
      options:
        - Windows
        - macOS
        - Windows 与 macOS
        - 与平台无关
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境与数据规模
      description: 不要提交密钥、令牌、完整私人会话或其他敏感信息。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 最小复现步骤
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: 诊断证据
      description: 提供脱敏日志、请求 ID、状态、超时、取消或崩溃信息。
    validations:
      required: true
  - type: input
    id: upstream_comparison
    attributes:
      label: 上游行为对比
      description: 如适用，填写对应正式 Release 的行为和证据。
  - type: checkboxes
    id: confirmation
    attributes:
      label: 提交确认
      options:
        - label: 我已删除或脱敏密钥、令牌和私人数据。
          required: true
        - label: 我已检查现有 Issue，未发现同一根因的重复报告。
          required: true
